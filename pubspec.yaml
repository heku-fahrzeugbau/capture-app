name: capture_app
description: Quick Notes App - Voice and text to Google Drive
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # Google Drive & Auth
  googleapis: ^11.4.0
  google_sign_in: ^6.2.0
  google_sign_in_web: ^0.12.2
  
  # Voice to Text
  speech_to_text: ^6.4.0
  
  # Local Storage
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # HTTP & Networking
  http: ^1.1.0
  
  # State Management
  provider: ^6.4.0
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
